# SonarQube / SonarScanner config for bilingual-language-learning-platform
# Run: sonar-scanner (with SonarQube server URL and token in env or here)
sonar.projectKey=bilingual-language-learning-platform
sonar.projectName=bilingual-language-learning-platform

sonar.sources=app,components,public
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/*.test.tsx,**/*.test.ts,**/__tests__/**,**/coverage/**,**/*.md,**/docs/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
